<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker</title>

<style>
  body {
    font-family: system-ui, sans-serif;
    background: #1e1e1e;
    color: #eee;
    margin: 20px;
  }

  /* --- CHART ROW (line chart + pie chart) --- */
  #charts-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  #linechart-div {
    flex: 1;
  }

  #piechart-div {
    width: 220px;
    height: 220px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* --- TOP 10 LIST --- */
  #topTenList {
    list-style: none;
    padding: 12px;
    margin: 0;
    background: #1e1e1e;
    border-radius: 8px;
  }

  #topTenList li {
    padding: 10px 14px;
    margin-bottom: 6px;
    background: #2a2a2a;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s ease;
    font-size: 14px;
  }

  #topTenList li:hover {
    background: #333;
  }

  .app-name {
    font-weight: 500;
  }

  .app-time {
    font-weight: 600;
    color: #4fc3f7;
  }

  /* --- RAW DATA BOX --- */
#raw-data-table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  background: #2a2a2a;
  border-radius: 6px;
  overflow: hidden;
  font-size: 14px;
}

#raw-data-table th {
  background: #333;
  padding: 10px;
  text-align: left;
  color: #4fc3f7;
  font-weight: 600;
}

#raw-data-table td {
  padding: 8px 10px;
  border-top: 1px solid rgba(255,255,255,0.08);
  color: #eee;
}

#raw-data-table tr:hover td {
  background: #3a3a3a;
}
.dropdown-section {
  margin-top: 20px;
  border: 1px solid #333;
  border-radius: 6px;
  overflow: hidden;
}

.dropdown-toggle {
  width: 100%;
  background: #222;
  color: #eee;
  padding: 10px 15px;
  text-align: left;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

.dropdown-toggle:hover {
  background: #2a2a2a;
}

.dropdown-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.25s ease-out;
  background: #1a1a1a;
  padding: 0 10px;
}

.dropdown-content.open {
  max-height: 800px;
  padding: 10px;
}
#weeklyChart {
  height: 400px;
}
.weekly-label {
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 260px; /* adjust if needed */
  display: inline-block;
}
#weeklyTopTenList {
  list-style: none;
  padding: 0;
  margin-top: 15px;
}

#weeklyTopTenList li {
  background: #2a2a2a;
  padding: 8px 12px;
  margin-bottom: 6px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

#weeklyTopTenList li:hover {
  background: #333;
}

.weekly-app-name {
  font-weight: 500;
}

.weekly-app-time {
  font-weight: 600;
  color: #4fc3f7;
}
#weeklyChartWrapper {
  max-height: 400px;   
  overflow-y: auto;
  margin-bottom: 20px;
}


</style>

</head>
<body>

<h1>Current Session</h1>

<!-- CHARTS ROW -->
<div id="charts-row">
  <div id="linechart-div">
      <canvas id="lineChart" width="500" height="300"></canvas>
  </div>

  <div id="piechart-div">
      <canvas id="pieChart" width="350" height="350"></canvas>
  </div>
</div>

<!-- TOP 10 LIST -->
<div id="top-ten">
  <ul id="topTenList"></ul>
</div>

<!-- RAW DATA -->
<table id="raw-data-table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="raw-data-body"></tbody>
</table>
<h2>Today's History</h2>
<canvas id="historyChart" width="600" height="400"></canvas>
<button class="dropdown-toggle" id="weeklyToggle">Weekly History ▼</button>

<div class="dropdown-content" id="weeklyContent">

  <div id="weeklyChartWrapper">
    <canvas id="weeklyChart"></canvas>
  </div>

  <h3>Top 10 This Week</h3>
  <ul id="weeklyTopTenList"></ul>

</div>

</div>

<script>
  window.addEventListener("DOMContentLoaded", () => {
  const weeklyToggle = document.getElementById("weeklyToggle");
  const weeklyContent = document.getElementById("weeklyContent");

 weeklyToggle.addEventListener("click", () => {
  weeklyContent.classList.toggle("open");

  if (weeklyContent.classList.contains("open")) {
    weeklyToggle.textContent = "Weekly History ▲";

    setTimeout(() => {
      weeklyChart.resize();
      weeklyChart.update();
    }, 50);
  } else {
    weeklyToggle.textContent = "Weekly History ▼";
  }
});

});

</script>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap"></script>
<script src="renderer.js"></script>

</body>



</html>
